name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

jobs:
  build_release:
    name: Build Release (${{ matrix.variant }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assemble${{ matrix.variantName }}Release --warning-mode all

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.variant }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/*.apk

  build_debug:
    name: Build Debug (${{ matrix.variant }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assemble${{ matrix.variantName }}Debug --warning-mode all

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.variant }}
          path: app/build/outputs/apk/${{ matrix.variant }}/debug/*.apk
